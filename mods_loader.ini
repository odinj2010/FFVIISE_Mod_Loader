[Loader]
; Enable logging output to the log file (true/false)
EnableLogging=true

; The directory name where mods are located (relative to the game folder)
; Each mod should live in its own subfolder inside this folder (e.g. mods/ModName/)
; Control loading priority by creating 'mods/load_order.txt' listing mod folder names
; (one per line, highest priority at the top). Auto-loads alphabetically if missing.
ModsDirectory=mods

; The directory name where DLL plugins are located (relative to the game folder)
PluginsDirectory=plugins

; How to handle splash screens (dotemu-logo.png, finelogo.png, press_start.png)
; - custom: Always loads the custom PNGs embedded in the DLL (ignores the mods folder). (default)
; - default: Checks active mod folders first for replacements (e.g. mods/ModName/dotemu-logo.png). If not found, loads original game files.
SplashScreens=custom

; The name of the log file to generate
LogFile=mods_loader_log.txt
